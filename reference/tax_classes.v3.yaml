openapi: 3.0.3
info:
  title: BigCommerce Internal API — Tax classes (batch Tax API)
  description: |
    OpenAPI for batch operations implemented by `Bigcommerce\Tax\Api\V1\Classes\ClassesController`
    (`batchPostAction`, `batchPutAction`, `batchDeleteAction`) via `TaxBatchResourceController`.

    **Route:** `tax/class` → controller `Bigcommerce\Tax\Api\V1\Classes\ClassesController`
    (`config/routes/V1/api_internal.php`). Full path is typically `/v1/tax/class` on the internal API host.

    **Auth:** `admin` and `hawk` (hawk config includes `api_proxy`).

    **Write access:** `TaxResourceController::beforeAction` enforces `Manage_Tax` for non-read-only actions and CSRF where applicable.

    **Responses:** Successful JSON bodies use the internal API envelope from `ResourceController::handleResponse`:
    `{ "data": ..., "meta": ... }`. Collection payloads from Fractal omit the inner `meta` key (it is hoisted to the outer `meta`).
    Batch POST/PUT return an array of tax class resources under `data` (see `ClassTransformer`).

    **DELETE:** `batchDeleteAction` uses `ClassesServiceRequest` built from query parameters; the path segment `:id`
    is ignored (`TaxBatchResourceController::deleteAction`). Deletes require `id:in` filter with the `in` operator.
  version: 1.0.0

servers:
  - url: https://internalapi-{store_id}.{host}/v1
    variables:
      store_id:
        default: '123456'
      host:
        default: mybigcommerce.com

tags:
  - name: Tax — Class (batch)
    description: V1 Tax API tax class batch CRUD (internal).

paths:
  /tax/class:
    post:
      tags: [Tax — Class (batch)]
      summary: Batch create tax classes
      description: |
        `batchPostAction`: JSON array of create items. Max **50** items per request (`TaxBatchResourceValidator`).
        Each `name` must be **1–100** characters, non-empty, and cannot contain angle brackets,
        braces, backticks, parentheses, semicolon, or pipe (see `TaxBatchResourceValidator::INVALID_DISPLAY_CHARACTERS`).
        Names must be **unique case-insensitively** within the batch.

        Conflicting names against existing data produce **409** (`DuplicateTaxClassNamesException` → `InternalApiException::create409`).
      operationId: taxClassBatchPost
      security:
        - adminAuth: []
        - hawkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxClassCreateBatch'
            example:
              - name: Class One
              - name: Class Two
      responses:
        '200':
          description: Created classes returned as a collection (default response status unless overridden upstream).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxClassCollectionEnvelope'
        '400':
          description: Bad request (e.g. invalid input via `InvalidInputException`, default status 400).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '409':
          description: Duplicate tax class names (conflict).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '413':
          description: Batch exceeds limit (50 items).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '422':
          description: |
            Unprocessable entity — empty body, non-array batch shape, duplicate `name` or `id` in batch per validator,
            or other `InternalApiException::create422` cases.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '403':
          description: Authentication or `Manage_Tax` denied.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '500':
          description: Unexpected error (wrapped by internal API factory in production).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'

    put:
      tags: [Tax — Class (batch)]
      summary: Batch update tax classes
      description: |
        `batchPutAction` (collection **PUT** only — `TaxBatchResourceController` allows PUT when `isCollection` is true).

        Request body: non-empty array, max **50** items. Each item must include:
        - `id`: positive integer (**unique** across the batch)
        - At least one non-`id` field; schema allows `name` (optional in Respect `keySet`, but **required in practice** so the item is not id-only).

        `name` when present: same length and character rules as create; **unique case-insensitively** in the batch.

        `ClassesNotFoundException` from `TaxClassService::update` → **400** (`InternalApiException::create400`).
        Duplicate names → **409** (same as create).
      operationId: taxClassBatchPut
      security:
        - adminAuth: []
        - hawkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxClassUpdateBatch'
            example:
              - id: 1
                name: Renamed One
              - id: 2
                name: Renamed Two
      responses:
        '200':
          description: Updated classes returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxClassCollectionEnvelope'
        '400':
          description: One or more classes not found (update).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '409':
          description: Duplicate tax class names.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '413':
          description: Batch exceeds 50 ids/items.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '422':
          description: Validation error (format, duplicate `id` in batch, invalid id values, id-only update payload, etc.).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '403':
          description: Authentication or permission denied.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '500':
          description: Server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'

    delete:
      tags: [Tax — Class (batch)]
      summary: Batch delete tax classes
      description: |
        `deleteAction` → `batchDeleteAction`. Request must include filter **`id:in`** with comma-separated positive integer ids
        (`validateBatchRequestUsesSupportedOperator` requires operator `in`; `getIdList()` reads the `in` criterion).

        Max **50** ids (`validateBatchRequestLimit`). Empty id list → **404** (`validateNonEmptyQueryFilter`).
        Invalid id values → **422**. `ClassesNotFoundException` on delete → **400**.

        Success returns **204 No Content** (`RESULT_NO_CONTENT`).
        The `:id` path parameter on singular delete routes is **not used** for the id list.
      operationId: taxClassBatchDelete
      security:
        - adminAuth: []
        - hawkAuth: []
      parameters:
        - name: id:in
          in: query
          required: true
          description: |
            Internal filter parameter: field `id`, operator `in`, comma-separated ids (e.g. `1,2,3`).
            Must use the `in` operator; other filter operators are rejected with **400**.
          schema:
            type: string
          example: '101,102,103'
      responses:
        '204':
          description: All listed classes deleted successfully.
        '400':
          description: Delete failed (e.g. class not found).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '404':
          description: Missing or empty `id:in` filter.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '413':
          description: More than 50 ids.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '422':
          description: Invalid id values in filter.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '403':
          description: Authentication or permission denied.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'
        '500':
          description: Server error.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponseEnvelope'

components:
  securitySchemes:
    adminAuth:
      type: apiKey
      in: header
      name: X-Auth-Client
      description: Internal API admin authentication (see platform docs).
    hawkAuth:
      type: apiKey
      in: header
      name: X-Auth-Client
      description: Hawk-authenticated clients (e.g. API proxy).

  schemas:
    TaxClassCreateBatch:
      type: array
      minItems: 1
      maxItems: 50
      items:
        type: object
        required:
          - name
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 100
            description: >
              Must not contain < > { } ` ( ) ; | (see TaxBatchResourceValidator::INVALID_DISPLAY_CHARACTERS).
        additionalProperties: false

    TaxClassUpdateBatch:
      type: array
      minItems: 1
      maxItems: 50
      items:
        type: object
        required:
          - id
          - name
        description: |
          Code allows optional `name` in Respect rules but requires at least one non-id field; only `name` is permitted besides `id`.
        properties:
          id:
            type: integer
            minimum: 1
          name:
            type: string
            minLength: 1
            maxLength: 100
        additionalProperties: false

    TaxClassResource:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time
          description: ISO-8601 (`DateTimeInterface::ATOM`).
        updated_at:
          type: string
          format: date-time

    TaxClassCollectionEnvelope:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaxClassResource'
        meta:
          type: object
          description: Fractal / serializer metadata (may be empty object).

    Problem:
      type: object
      description: RFC 7807-style problem object (optional fields omitted when empty).
      properties:
        title:
          type: string
        status:
          type: integer
        type:
          type: string
          format: uri
        detail:
          type: string
        code:
          type: integer
        errors:
          type: object
          additionalProperties: true

    ProblemResponseEnvelope:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Problem'
        meta:
          type: object
